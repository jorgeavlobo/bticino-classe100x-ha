name: Translations

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate translation completeness
        run: python3 scripts/validate_translations.py
