name: Diagnostics

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  self-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run diagnostics self-test
        run: python3 scripts/validate_health_check.py
      - name: Run reference-scan self-test
        run: python3 scripts/validate_reference_scan.py
