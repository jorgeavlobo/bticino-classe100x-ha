# Keeps the GitHub Actions pinned in .github/workflows/ current. Because the
# workflow pins every action to a commit SHA, Dependabot opens a PR (updating
# both the SHA and its version comment) whenever a newer release appears, so the
# pipeline stays both reproducible and up to date.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
