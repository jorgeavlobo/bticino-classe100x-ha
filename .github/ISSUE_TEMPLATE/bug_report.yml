name: Bug report
description: Report a problem with the integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Home Assistant logs.
      render: text

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.7.1"

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.0.1"
