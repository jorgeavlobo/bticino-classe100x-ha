# BTicino CLASSE100X — painel de exemplo (Português)
# Os nomes dos cartões são estáticos: o Home Assistant não traduz o YAML do
# painel, por isso as etiquetas abaixo são escolhidas por si, não pela
# integração. Consulte docs/Dashboard.md.
title: BTicino CLASSE100X
views:
  - title: Videoporteiro
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: button.bticino_classe100x_condominium_gate
            name: Portão do condomínio
            icon: mdi:gate
          - type: tile
            entity: button.bticino_classe100x_pedestrian_door
            name: Porta pedonal
            icon: mdi:door
          - type: tile
            entity: binary_sensor.bticino_classe100x_connection_status
            name: Ligação
          - type: tile
            entity: sensor.bticino_classe100x_health_status
            name: Estado geral

      - type: entities
        title: Diagnóstico
        entities:
          - entity: button.bticino_classe100x_test_ssh_connection
            name: Testar ligação
          - entity: sensor.bticino_classe100x_ssh_latency
            name: Latência SSH
          - entity: sensor.bticino_classe100x_openwebnet_latency
            name: Latência OpenWebNet
          - entity: sensor.bticino_classe100x_last_test_result
            name: Resultado do último teste
          - entity: sensor.bticino_classe100x_last_successful_test
            name: Último teste com sucesso
          - entity: sensor.bticino_classe100x_last_failed_test
            name: Último teste falhado
