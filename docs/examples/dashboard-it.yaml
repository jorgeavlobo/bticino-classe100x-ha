# BTicino CLASSE100X — dashboard di esempio (Italiano)
# I nomi delle schede sono statici: Home Assistant non traduce lo YAML della
# dashboard, quindi le etichette seguenti sono scelte da te, non
# dall'integrazione. Vedi docs/Dashboard.md.
title: BTicino CLASSE100X
views:
  - title: Videocitofono
    cards:
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: button.bticino_classe100x_condominium_gate
            name: Cancello condominiale
            icon: mdi:gate
          - type: tile
            entity: button.bticino_classe100x_pedestrian_door
            name: Porta pedonale
            icon: mdi:door
          - type: tile
            entity: binary_sensor.bticino_classe100x_connection_status
            name: Connessione
          - type: tile
            entity: sensor.bticino_classe100x_health_status
            name: Stato generale

      - type: entities
        title: Diagnostica
        entities:
          - entity: button.bticino_classe100x_test_ssh_connection
            name: Prova connessione
          - entity: sensor.bticino_classe100x_ssh_latency
            name: Latenza SSH
          - entity: sensor.bticino_classe100x_openwebnet_latency
            name: Latenza OpenWebNet
          - entity: sensor.bticino_classe100x_last_test_result
            name: Risultato ultimo test
          - entity: sensor.bticino_classe100x_last_successful_test
            name: Ultimo test riuscito
          - entity: sensor.bticino_classe100x_last_failed_test
            name: Ultimo test fallito
